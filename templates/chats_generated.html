<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Layout</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background: #f5f5f5;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            background: #2c3e50;
            color: white;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .select-model {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border-radius: 5px;
            border: none;
            background: #34495e;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .chat {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin: 5px 0;
            background: #34495e;
            border-radius: 5px;
            cursor: pointer;
        }

        .chat:hover {
            background: #3d5a73;
        }

        #addNewChat{
            background: #1abc9c;
            font-weight: bold;
        }

        .chat-text{
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-menu-wrapper{
            position: relative;
        }

        .chat-menu{
            background: transparent;
            border: none;
            color: white;
            margin-left: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        .chat-menu:hover{
            opacity: 0.7;
        }

        .dropdown{
            position: absolute;
            right: 0;
            top: 100%;
            background: white;
            color: black;
            border-radius: 5px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            min-width: 100px;
            z-index: 10;

            display: none; /* this will be toggled by JS */
        }

        .dropdown-item{
            border-radius: 5px;
            padding: 8px 10px;
            cursor: pointer;
        }

        .dropdown-item:hover {
            background: #eee;
        }

        .delete {
            color: red;
        }



        /* Main */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            min-width: 0; /* prevent overflow pushing layout */
        }

        /* Messages area (scrollable only here) */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 0; /* critical for flexbox wrapping */
        }

        .title{
            font-size: 18px;
        }

        .message {
            padding: 10px;
            border-radius: 6px;
            max-width: 70%;
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .message.user {
            align-self: flex-end;
            background: #4CAF50;
            color: white;
        }

        .message.system {
            align-self: flex-start;
            background: #e0e0e0;
            color: black;
        }

        /* Input fixed at bottom */
        .input-container {
            display: flex;
            padding: 10px;
            background: #ddd;
            border-top: 1px solid #ccc;
        }

        .input-container textarea {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }

        .input-container button {
            margin-left: 10px;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            background: #4CAF50;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .input-container button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <select class="select-model">
        <option>Option 1</option>
        <option>Option 2</option>
        <option>Option 3</option>
    </select>
    <div id="addNewChat" class="chat" onclick="addNewChat()">New chat</div>
    <div id="chatList">
        <div class="chat">
            <span class="chat-text">Chat 1</span>
            <div class="chat-menu-wrapper">
                <button class="chat-menu">...</button>
                <div class="dropdown">
                    <div class="dropdown-item rename">Rename</div>
                    <div class="dropdown-item delete">Delete</div>
                </div>
            </div>
        </div>
        <div class="chat">
            <span class="chat-text">Chat 2</span>
            <div class="chat-menu-wrapper">
                <button class="chat-menu">...</button>
                <div class="dropdown">
                    <div class="dropdown-item rename">Rename</div>
                    <div class="dropdown-item delete">Delete</div>
                </div>
            </div>
        </div>
        <div class="chat">
            <span class="chat-text">Chat 3</span>
            <div class="chat-menu-wrapper">
                <button class="chat-menu">...</button>
                <div class="dropdown">
                    <div class="dropdown-item rename">Rename</div>
                    <div class="dropdown-item delete">Delete</div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Main Chat Area -->
<div class="main">
    <div id="messages" class="messages">
        <div class="title">This is a very long title for a custom chat, what do you think about it? This is a very long title for a custom chat, what do you think about it? This is a very long title for a custom chat, what do you think about it?</div>
    </div>

    <div class="input-container">
        <textarea id="inputBox" placeholder="Type a message..."></textarea>
        <button onclick="addText()">Send</button>
    </div>
</div>

<script>
    let messageCount = 0;
    let activeDropdown = null;

    function toggleDropdown(e){
        console.log('toggleDropdown');
        e.stopPropagation();
        const el = e.target;
        if(el.className === 'chat-menu'){
            const dropdown = el.nextElementSibling;
            if(activeDropdown && dropdown === activeDropdown){
                activeDropdown.style.display = 'none';
                activeDropdown = null;
            }else{
                if(activeDropdown){
                    activeDropdown.style.display = 'none';
                }
                activeDropdown = dropdown;
                activeDropdown.style.display = 'block';
            }
        }
    }

    const chatList = document.getElementById('chatList');
    chatList.addEventListener('click', toggleDropdown);

    function hideDropdownOnExternalClick(e){
        console.log('hideDropDownOnExternalClick');
        if(activeDropdown){
            activeDropdown.style.display = 'none';
            activeDropdown = null;
        }
    }

    document.addEventListener('click', hideDropdownOnExternalClick);

    function addText() {

        const input = document.getElementById('inputBox');
        const messages = document.getElementById('messages');

        if(input.value.trim() === ''){
            input.value = '';
            return;
        }

        const msg = document.createElement('div');

        // Alternate between user and system
        const role = messageCount % 2 === 0 ? 'user' : 'system';
        msg.className = 'message ' + role;

        msg.textContent = input.value.trim();

        messages.appendChild(msg);
        messages.scrollTop = messages.scrollHeight;

        messageCount++;
        input.value = '';
    }


    function addNewChat() {
        const chatList = document.getElementById('chatList');
        const name = prompt('Enter new item name:');

        if (name && name.trim() !== '') {
            const chat = document.createElement('div');
            const chatText = document.createElement('span');
            const chatMenuWrapper = document.createElement('div');
            const chatMenu = document.createElement('button');
            const chatDropdown = document.createElement('div');
            const chatRename = document.createElement('div');
            const chatDelete = document.createElement('div');

            chat.className = 'chat';
            chatText.className = 'chat-text';
            chatMenuWrapper.className = 'chat-menu-wrapper';
            chatMenu.className = 'chat-menu';
            chatDropdown.className = 'dropdown';
            chatRename.className = 'dropdown-item rename';
            chatDelete.className = 'dropdown-item delete';

            chatText.textContent = name.trim();
            chatMenu.textContent = '...';
            chatRename.textContent = 'Rename';
            chatDelete.textContent = 'Delete';

            chatDropdown.append(chatRename, chatDelete);
            chatMenuWrapper.append(chatMenu, chatDropdown);
            chat.append(chatText, chatMenuWrapper);
            chatList.append(chat);
        }
    }


    document.getElementById('inputBox').addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey){
            e.preventDefault();
            addText();
        }
    });


</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Layout</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background: #f5f5f5;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            background: #2c3e50;
            color: white;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar h2 {
            margin-top: 0;
            font-size: 18px;
        }

        .item {
            padding: 10px;
            margin: 5px 0;
            background: #34495e;
            border-radius: 5px;
            cursor: pointer;
        }

        .item:hover {
            background: #3d5a73;
        }

        /* Main */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            min-width: 0; /* prevent overflow pushing layout */
        }

        /* Messages area (scrollable only here) */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 0; /* critical for flexbox wrapping */
        }

        .message {
            padding: 10px;
            border-radius: 6px;
            max-width: 70%;
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .message.user {
            align-self: flex-end;
            background: #4CAF50;
            color: white;
        }

        .message.system {
            align-self: flex-start;
            background: #e0e0e0;
            color: black;
        }

        /* Input fixed at bottom */
        .input-container {
            display: flex;
            padding: 10px;
            background: #ddd;
            border-top: 1px solid #ccc;
        }

        .input-container input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }

        .input-container button {
            margin-left: 10px;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            background: #4CAF50;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .input-container button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>Items</h2>
    <div class="item" onclick="addNewItem()" style="background:#1abc9c; font-weight:bold;">+ Add New Item</div>
    <div id="itemList">
        <div class="item">Item 1</div>
        <div class="item">Item 2</div>
        <div class="item">Item 3</div>
    </div>
</div>

<!-- Main Chat Area -->
<div class="main">
    <div id="messages" class="messages">
        <div class="message">Welcome! Start typing below.</div>
    </div>

    <div class="input-container">
        <input type="text" id="inputBox" placeholder="Type a message...">
        <button onclick="addText()">Send</button>
    </div>
</div>

<script>
    let messageCount = 0;

    function addText() {
        const input = document.getElementById('inputBox');
        const messages = document.getElementById('messages');

        if (input.value.trim() !== '') {
            const msg = document.createElement('div');

            // Alternate between user and system
            const type = messageCount % 2 === 0 ? 'user' : 'system';
            msg.className = 'message ' + type;

            msg.textContent = input.value;

            messages.appendChild(msg);
            messages.scrollTop = messages.scrollHeight;

            input.value = '';
            messageCount++;
        }
    }


    function addNewItem() {
        const itemList = document.getElementById('itemList');
        const name = prompt('Enter new item name:');

        if (name && name.trim() !== '') {
            const newItem = document.createElement('div');
            newItem.className = 'item';
            newItem.textContent = name;
            itemList.appendChild(newItem);
        }
    }

    document.getElementById('inputBox').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') addText();
    });
</script>

</body>
</html>
